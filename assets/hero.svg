<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0033"/>
      <stop offset="0.55" stop-color="#3d1a5b"/>
      <stop offset="1" stop-color="#0d0221"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe14d"/>
      <stop offset="0.5" stop-color="#ff6ec7"/>
      <stop offset="1" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00fff0"/>
      <stop offset="1" stop-color="#00b3ff"/>
    </linearGradient>
    <filter id="glowC" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#00fff0" flood-opacity="0.9"/>
    </filter>
    <filter id="glowM" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ff2e97" flood-opacity="0.9"/>
    </filter>
    <clipPath id="sunclip"><circle cx="600" cy="235" r="120"/></clipPath>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000000" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1200" height="380" fill="url(#sky)"/>

  <!-- synthwave sun with bands -->
  <g clip-path="url(#sunclip)">
    <circle cx="600" cy="235" r="120" fill="url(#sun)"/>
    <g fill="#0d0221" opacity="0.85">
      <rect x="480" y="250" width="240" height="6"/>
      <rect x="480" y="262" width="240" height="8"/>
      <rect x="480" y="276" width="240" height="10"/>
      <rect x="480" y="292" width="240" height="14"/>
      <rect x="480" y="312" width="240" height="20"/>
    </g>
  </g>

  <!-- perspective grid floor -->
  <g stroke="#ff2e97" stroke-width="1.5" opacity="0.55">
    <line x1="0" y1="380" x2="600" y2="300"/><line x1="120" y1="380" x2="600" y2="300"/>
    <line x1="300" y1="380" x2="600" y2="300"/><line x1="480" y1="380" x2="600" y2="300"/>
    <line x1="1200" y1="380" x2="600" y2="300"/><line x1="1080" y1="380" x2="600" y2="300"/>
    <line x1="900" y1="380" x2="600" y2="300"/><line x1="720" y1="380" x2="600" y2="300"/>
  </g>
  <g stroke="#00fff0" stroke-width="1.5" opacity="0.4">
    <line x1="0" y1="312" x2="1200" y2="312"/>
    <line x1="0" y1="330" x2="1200" y2="330"/>
    <line x1="0" y1="352" x2="1200" y2="352"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
  </g>

  <!-- title -->
  <text x="600" y="150" text-anchor="middle" font-size="74" font-weight="bold" letter-spacing="4"
        fill="url(#title)" filter="url(#glowC)">UNITY · AI</text>
  <text x="600" y="222" text-anchor="middle" font-size="66" font-weight="bold" letter-spacing="6"
        fill="#ff2e97" filter="url(#glowM)">GAME ENGINE</text>

  <!-- subtitle chip -->
  <rect x="360" y="248" width="480" height="34" rx="17" fill="#0d0221" stroke="#39ff14" stroke-width="2" opacity="0.9"/>
  <text x="600" y="271" text-anchor="middle" font-size="18" font-weight="bold" letter-spacing="2"
        fill="#39ff14">▶ CLAUDE CODE BUILDS UNITY · LIVE</text>

  <rect width="1200" height="380" fill="url(#scan)"/>
</svg>
